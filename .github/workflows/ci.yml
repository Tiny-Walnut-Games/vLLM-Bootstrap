name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Run format check
        run: npm run format:check

      - name: Run configuration validation tests
        run: |
          npx playwright install --with-deps chromium
          npx playwright test tests/e2e/configuration-validation.spec.ts --reporter=html --reporter=json --reporter=junit
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-reports/
          retention-days: 30

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-node-${{ matrix.node-version }}
          path: test-reports/html/
          retention-days: 30

  validate-scripts:
    name: Validate Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate shell scripts
        run: |
          echo "Checking shell scripts for syntax errors..."
          for script in scripts/*.sh; do
            if [ -f "$script" ]; then
              echo "Validating $script"
              bash -n "$script" || exit 1
            fi
          done

      - name: Check script permissions
        run: |
          echo "Verifying executable permissions..."
          for script in scripts/*.sh; do
            if [ -f "$script" ] && [ ! -x "$script" ]; then
              echo "Warning: $script is not executable"
            fi
          done

  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check for broken links in markdown
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'
        continue-on-error: true

      - name: Validate documentation structure
        run: |
          echo "Checking documentation structure..."

          # Check required files exist
          required_files=(
            "README.md"
            "CHANGELOG.md"
            "CONTRIBUTING.md"
            "LICENSE"
            "docs/README.md"
            "docs/guides/complete-setup.md"
            "docs/reference/known-issues.md"
            "docs/reference/testing.md"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Error: Required file missing: $file"
              exit 1
            fi
          done

          echo "All required documentation files present ✓"
