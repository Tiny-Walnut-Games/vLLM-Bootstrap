name: Test All Model Tiers (E2E)
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/test-all-tiers.yml'
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  # ============================================================================
  # LINUX (Canonical) - All four tiers
  # ============================================================================
  test-linux-all-tiers:
    name: Linux - All Tiers (1B, 4B, 7B, 15B)
    runs-on: ubuntu-latest-gpu-l4 # GPU runner with sufficient VRAM
    timeout-minutes: 120
    strategy:
      matrix:
        tier:
          - name: '1B Fast'
            role: 'fast'
            port: 8100
            timeout: 180
            skip: false
          - name: '4B Edit'
            role: 'edit'
            port: 8300
            timeout: 240
            skip: false
          - name: '7B QA'
            role: 'qa'
            port: 8500
            timeout: 300
            skip: false
          - name: '15B Plan'
            role: 'plan'
            port: 8700
            timeout: 360
            skip: false
      max-parallel: 1 # Run tiers sequentially (only one model at a time)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify GPU availability (Linux)
        run: |
          echo "=== GPU Information ==="
          nvidia-smi || echo "nvidia-smi not available"
          python3 -c "import torch; print(f'CUDA Available: {torch.cuda.is_available()}'); print(f'CUDA Devices: {torch.cuda.device_count()}')" || echo "PyTorch CUDA check failed"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu121
          pip install vllm
          pip install huggingface-hub

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Setup bootstrap environment
        if: matrix.tier.skip == false
        run: |
          mkdir -p ~/.config/llm-doctrine
          cp scripts/initial-bootstrap.sh ~/.config/llm-doctrine/
          cp scripts/daily-bootstrap.sh ~/.config/llm-doctrine/ || echo "daily-bootstrap.sh may not exist yet"
          chmod +x ~/.config/llm-doctrine/*.sh

      - name: Run initial bootstrap
        if: matrix.tier.skip == false
        run: |
          cd ~/.config/llm-doctrine
          bash ./initial-bootstrap.sh

      - name: Launch ${{ matrix.tier.name }} model
        if: matrix.tier.skip == false
        timeout-minutes: 15
        run: |
          cd ~/.config/llm-doctrine
          source ~/torch-env/bin/activate
          timeout ${{ matrix.tier.timeout }} bash ./daily-bootstrap.sh ${{ matrix.tier.role }} &
          MODEL_PID=$!

          echo "Model process started with PID: $MODEL_PID"
          sleep 10

          # Wait for health endpoint with timeout
          ELAPSED=0
          while [ $ELAPSED -lt 300 ]; do
            if curl -s -f -H "Authorization: Bearer fallback-token-12345" http://localhost:${{ matrix.tier.port }}/health > /dev/null 2>&1; then
              echo "✅ Model ready on port ${{ matrix.tier.port }}"
              break
            fi
            echo "⏳ Waiting for model... (${ELAPSED}s)"
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          if [ $ELAPSED -ge 300 ]; then
            echo "❌ Timeout waiting for model"
            curl -v -H "Authorization: Bearer fallback-token-12345" http://localhost:${{ matrix.tier.port }}/health || true
            exit 1
          fi

      - name: Verify model is responding
        if: matrix.tier.skip == false
        run: |
          echo "Testing model health..."
          curl -s -H "Authorization: Bearer fallback-token-12345" http://localhost:${{ matrix.tier.port }}/health | jq . || curl -v -H "Authorization: Bearer fallback-token-12345" http://localhost:${{ matrix.tier.port }}/health

          echo "Testing models endpoint..."
          curl -s -H "Authorization: Bearer fallback-token-12345" http://localhost:${{ matrix.tier.port }}/v1/models | jq . || echo "Models endpoint failed"

      - name: Run test for ${{ matrix.tier.name }}
        if: matrix.tier.skip == false
        run: |
          export TEST_PORT=${{ matrix.tier.port }}
          export TEST_TIER=${{ matrix.tier.role }}

          # Run generic API validation test
          npx playwright test tests/e2e/api-validation.spec.ts \
            --grep "Fast.*Model Tier" \
            --reporter=html \
            --reporter=json \
            --reporter=list || true

      - name: Test 1B tier specific chat scenarios
        if: matrix.tier.role == 'fast' && matrix.tier.skip == false
        run: |
          npx playwright test tests/e2e/cli-chat-1b.spec.ts \
            --reporter=html \
            --reporter=json \
            --reporter=list

      - name: Cleanup model process
        if: matrix.tier.skip == false && always()
        run: |
          pkill -f "vllm.*${{ matrix.tier.port }}" || true
          sleep 2

      - name: Upload test reports
        if: matrix.tier.skip == false && always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-linux-${{ matrix.tier.role }}
          path: test-reports/
          if-no-files-found: ignore

  # ============================================================================
  # WINDOWS (Future) - Placeholder for multi-OS support
  # ============================================================================
  test-windows-placeholder:
    name: Windows - Placeholder (Future)
    runs-on: windows-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/heads/main')
    steps:
      - name: Skip Windows tests
        run: |
          Write-Host "Windows tests are not yet implemented"
          Write-Host "TODO: Configure Windows GPU runner and WSL2 environment"
          Write-Host "See: .github/workflows/test-windows.yml (to be created)"

  # ============================================================================
  # MACOS (Future) - Placeholder for multi-OS support
  # ============================================================================
  test-macos-placeholder:
    name: macOS - Placeholder (Future)
    runs-on: macos-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/heads/main')
    steps:
      - name: Skip macOS tests
        run: |
          echo "macOS tests are not yet implemented"
          echo "TODO: Configure macOS GPU support (MPS/MLX)"
          echo "See: .github/workflows/test-macos.yml (to be created)"

  # ============================================================================
  # SUMMARY
  # ============================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-linux-all-tiers]
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports
          merge-multiple: true

      - name: Generate summary
        run: |
          echo "## 🧪 E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Linux Tests (Canonical)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 1B Tier (Fast)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 4B Tier (Edit)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 7B Tier (QA)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 15B Tier (Plan)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Multi-OS Support (Planned)" >> $GITHUB_STEP_SUMMARY
          echo "- ⏳ Windows (WSL2 + GPU)" >> $GITHUB_STEP_SUMMARY
          echo "- ⏳ macOS (MPS/MLX)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Details**: See artifact reports for each tier" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ E2E tests completed for all 4 model tiers on Linux. Check the test summary above.'
            })
